name: pages

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_run:                       # daily/weekly 用 GITHUB_TOKEN 推的資料 commit 不會觸發上面的 push;
    workflows: ["weekly", "daily"]    # 改用 workflow_run,在它們跑完後自動部署,線上才會跟上每日資料
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
