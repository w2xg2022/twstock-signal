name: weekly

on:
  schedule:
    - cron: "0 3 * * 6"   # 每週六 03:00 UTC（台灣週六 11:00）
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # 只抓yfinance價格(~10分)+2個指數；無FinMind限流問題
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 產生本週推薦
        run: python scripts/generate_picks.py
      - name: 追蹤歷史推薦績效
        run: python scripts/track_perf.py
      - name: 產生 docs 資料
        run: python scripts/build_docs_data.py
      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data docs
          git commit -m "weekly update $(date -u +%Y-%m-%d)" || echo "無變更"
          git push
      - name: Release 本週推薦
        run: |
          LATEST=$(ls -t data/picks/*.csv | head -1)
          DATE=$(basename "$LATEST" .csv)
          MONKEY=$(ls -t data/monkey/*.csv | head -1)
          gh release create "picks-$DATE" "$LATEST" "$MONKEY" --title "本週推薦 $DATE 🧑‍💻 vs 🐒" --notes $'策略：多頭排列 → beta120∈[0,1] → 收盤離MA20<10% → alpha120排序 → 前5檔。\n買入價＝推薦隔日(高+低)/2，出場＝進場後第15~20交易日均價(TWAP)。\n同附一組隨機5檔(猴子，Malkiel《漫步華爾街》)一起對戰。詳見 README 與 docs 績效頁。' || echo "release 已存在"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
