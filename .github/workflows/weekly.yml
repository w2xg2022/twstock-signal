name: weekly

on:
  schedule:
    - cron: "0 3 * * 6"   # 每週六 03:00 UTC（台灣週六 11:00）
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 50    # 選股抓全市場+track_perf抓10隻猴子~1000檔；無FinMind限流問題
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 產生本週入選
        run: python scripts/generate_picks.py
      - name: 追蹤歷史入選績效
        run: python scripts/track_perf.py
      - name: 產生 docs 資料
        run: python scripts/build_docs_data.py
      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data docs
          git commit -m "weekly update $(date -u +%Y-%m-%d)" || echo "無變更"
          git push
