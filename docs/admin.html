<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猴子明細後台（admin）</title>
<style>
  body{font-family:system-ui,"Microsoft JhengHei",sans-serif;max-width:960px;margin:0 auto;padding:16px;color:#222;line-height:1.6}
  h1{font-size:1.4rem;margin-bottom:2px} .sub{color:#666;font-size:.86rem}
  .token-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:14px;margin:12px 0}
  .token-box label{font-size:.85rem;color:#444;display:block;margin-bottom:6px}
  .token-box input{width:100%;padding:8px;box-sizing:border-box;border:1px solid #ccc;border-radius:6px;font-size:.9rem}
  button.load{margin-top:8px;background:#1565c0;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.9rem}
  .qtabs{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0}
  .qtabs .qbtn{padding:5px 13px;border:1px solid #ccc;background:#f0f0f0;border-radius:6px;cursor:pointer;font-size:.84rem}
  .qtabs .qbtn.active{background:#455a64;color:#fff;border-color:#455a64;font-weight:bold}
  .grphead{font-weight:bold;margin:10px 0 4px} .grphead .d{color:#666;font-weight:normal;font-size:.85rem}
  table{border-collapse:collapse;width:100%;margin:4px 0;font-size:.84rem}
  th,td{border:1px solid #e5e5e5;padding:4px 7px;text-align:right;white-space:nowrap} th{background:#f5f5f5}
  td.l,th.l{text-align:left}
  .pos{color:#c62828} .neg{color:#2e7d32}
  .hd{font-size:.72rem;color:#999}
  .log{font-size:.78rem;color:#666;background:#fafafa;border:1px solid #eee;border-radius:6px;padding:8px;margin-top:12px;white-space:pre-wrap;max-height:160px;overflow-y:auto}
  .mid{background:#eef4ff}
</style>
</head>
<body>
  <h1>🐒 猴子明細後台<span style="font-size:.8rem;color:#999">（admin）</span></h1>
  <p class="sub">僅預測中週次、全 10 隻猴子每一檔個股，<b>依個股收盤報酬由高到低排序</b>（不分猴子）。此頁不公開連結、資料不在 Pages 站上，需 GitHub Token 經 API 讀取。</p>

  <div class="token-box">
    <label for="tok">GitHub Personal Access Token（需對本 repo 有 <b>Contents: Read</b> 權限，只存在你這台瀏覽器）</label>
    <input type="password" id="tok" placeholder="github_pat_xxx 或 ghp_xxx" autocomplete="off">
    <button class="load" id="loadbtn">載入猴子明細</button>
  </div>

  <div class="qtabs" id="tabs"></div>
  <div id="body"></div>
  <div class="log" id="log">尚未載入。</div>
  <p class="sub"><a href="index.html">← 回公開頁</a></p>

  <script src="admin.js"></script>
</body>
</html>
